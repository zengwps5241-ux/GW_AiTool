<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GokTech Agent · 登录</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-page">
  <form id="form" class="login-card">
    <h1>登录 GokTech Agent</h1>
    <input id="username" name="username" placeholder="账号" autocomplete="username" required />
    <input id="password" name="password" type="password" placeholder="密码" autocomplete="current-password" required />
    <button type="submit">登录</button>
    <div id="err" class="err"></div>
  </form>
  <script src="/static/login.js"></script>
</body>
</html>
